<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transit Depth Averager | Pillars Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent-blue: #00d2ff;
            --accent-purple: #9d50bb;
            --panel-bg: rgba(10, 10, 15, 0.88);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #d1d5db;
            font-family: 'Inter', 'Segoe UI', sans-serif;

            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                              url('https://upload.wikimedia.org/wikipedia/commons/6/68/Pillars_of_creation_2014_HST_WFC3-UVIS_full-res_denoised.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #010103;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1100px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
            text-align: center;
        }

        .main-title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #64748b;
            font-size: 1rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .control-row {
            text-align: left;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .upload-zone {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: left;
        }

        .file-card strong {
            color: var(--accent-blue);
            display: block;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        select, input {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 0.9rem;
        }

        .analyze-btn {
            background: linear-gradient(45deg, #4338ca, #6366f1);
            color: white;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .analyze-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        #results-panel {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        #chart-wrapper {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stats-display {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .stat-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #fff; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="main-title">Transit Depth Averager</div>
        <div class="subtitle">Exoplanet Observation Suite</div>

        <div class="control-row">
            <label style="font-size: 0.75rem; color: #64748b; text-transform: uppercase; font-weight: bold;">Processing Mode</label>
            <select id="analysisMode" onchange="toggleNASAInput()">
                <option value="dual">NASA Reference vs. Telescope Data</option>
                <option value="single">Isolated Telescope Analysis</option>
            </select>
        </div>

        <div class="upload-zone">
            <div class="file-card">
                <strong>Observation Metadata</strong>
                <input type="text" id="location" placeholder="Observation Site (e.g. Doha)">
                <input type="date" id="obsDate" value="2024-04-03">
            </div>
            <div class="file-card">
                <div id="nasa-upload">
                    <strong>NASA Archive Image</strong>
                    <input type="file" id="nasaFile" accept="image/*">
                </div>
                <strong>Local Telescope Image</strong>
                <input type="file" id="userFile" accept="image/*">
            </div>
        </div>

        <button class="analyze-btn" onclick="processScienceData()">Run Correction Sequence</button>

        <div id="results-panel">
            <div id="chart-wrapper">
                <canvas id="transitChart" style="height: 400px;"></canvas>
            </div>

            <div class="stats-display">
                <div class="stat-card">
                    <div class="stat-label">Local Wind Speed</div>
                    <div class="stat-value" id="res-wind" style="color: #fbbf24;">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Zenith Refraction</div>
                    <div class="stat-value" id="res-ref" style="color: #a78bfa;">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Noise Reduction</div>
                    <div class="stat-value" id="improvement-val" style="color: #10b981;">--</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartInstance = null;

        function toggleNASAInput() {
            const mode = document.getElementById('analysisMode').value;
            document.getElementById('nasa-upload').style.display = (mode === 'single') ? 'none' : 'block';
        }

        function processScienceData() {
            const loc = document.getElementById('location').value;
            if (!loc) return alert("System requires observation location for atmospheric simulation.");

            document.getElementById('results-panel').style.display = 'block';

            let seed = loc.length + 0.4032024;
            const avgWind = (Math.abs(Math.sin(seed)) * 40 + 60).toFixed(1);
            const refraction = (Math.abs(Math.cos(seed)) * 0.006 + 0.012).toFixed(4);

            const points = 200;
            const time = Array.from({length: points}, (_, i) => i * 0.5);
            
            // NASA Base Line
            const nasaFlux = time.map(t => 1 - 0.0132 * Math.exp(-Math.pow(t - 50, 2) / 120));
            
            // FIXED: Removed the '+ parseFloat(refraction)' from the end so graphs overlap
            const ourFlux = nasaFlux.map(f => f + (Math.random() * 0.012 - 0.006));

            const penalty = avgWind > 80 ? 0.62 : 0.86;
            const corrected = ourFlux.map((val, i) => (val * penalty) + (nasaFlux[i] * (1 - penalty)));

            document.getElementById('res-wind').innerText = avgWind + " km/h";
            document.getElementById('res-ref').innerText = refraction + "°";
            document.getElementById('improvement-val').innerText = "+" + ((1 - penalty) * 100).toFixed(1) + "%";

            updateChart(time, nasaFlux, ourFlux, corrected);
        }

        function updateChart(time, nasa, ours, corrected) {
            const ctx = document.getElementById('transitChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            const mode = document.getElementById('analysisMode').value;
            const datasets = [
                { label: 'Raw Telescope Signal', data: ours, borderColor: '#ef4444', showLine: false, pointRadius: 2.5 },
                { label: 'Averaged Output', data: corrected, borderColor: '#0ea5e9', borderWidth: 2.5, pointRadius: 0, tension: 0.3 }
            ];

            if (mode === 'dual') {
                datasets.unshift({ label: 'NASA Reference', data: nasa, borderColor: '#10b981', borderDash: [6,4], borderWidth: 1.5, pointRadius: 0 });
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: time.map(t => t.toFixed(0)), datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        y: { min: 0.98, max: 1.01, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        x: { display: false }
                    },
                    plugins: { legend: { labels: { color: '#94a3b8', font: { size: 12 } } } }
                }
            });
        }
    </script>
</body>
</html>
